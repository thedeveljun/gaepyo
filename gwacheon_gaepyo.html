<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>과천시장 개표집계</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
:root{
  --dem:#0a3d91; --dem-soft:#e7eefb;
  --ppp:#d6122a; --ppp-soft:#fbe8eb;
  --ref:#e8730c; --ref-soft:#fdeede;
  --wait:#6d4bd0; --wait-soft:#efe9fb;
  --ink:#15181d; --muted:#6b7280; --line:#e5e7eb;
  --bg:#f4f5f7; --card:#ffffff; --done:#0f9d58;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:"Pretendard",system-ui,sans-serif;
  font-feature-settings:"tnum" 1;-webkit-text-size-adjust:100%}
body{padding-bottom:90px}
.wrap{max-width:560px;margin:0 auto}

.summary{position:sticky;top:0;z-index:50;background:#0d1117;color:#fff;padding:12px 14px 13px;border-bottom:3px solid #000}
.summary .ttl{font-size:13px;letter-spacing:.04em;color:#9aa4b2;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.summary .ttl b{color:#fff;font-weight:700;font-size:13px}
.bars{display:flex;flex-direction:column;gap:7px}
.bar{display:flex;align-items:center;gap:9px}
.bar .dot{width:11px;height:11px;border-radius:50%;flex:none}
.bar .nm{font-size:14px;font-weight:700;width:62px;flex:none}
.bar .track{flex:1;height:20px;background:#222932;border-radius:5px;overflow:hidden;position:relative}
.bar .fill{height:100%;border-radius:5px;transition:width .35s ease}
.bar .pct{position:absolute;right:7px;top:50%;transform:translateY(-50%);font-size:12px;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5)}
.bar .vot{font-size:14px;font-weight:800;width:74px;text-align:right;flex:none;font-variant-numeric:tabular-nums}
.gapline{display:flex;justify-content:space-between;align-items:center;margin-top:9px;padding-top:9px;border-top:1px solid #222932;font-size:13px}
.gapline .gap{font-weight:800;font-size:15px;color:#fff}
.gapline .prog{color:#9aa4b2;font-size:13px}
.subline{margin-top:6px;font-size:12px;color:#9aa4b2;text-align:right}

.toolbar{display:flex;gap:7px;padding:8px 12px 4px;align-items:center}
.toolbar .save{font-size:13px;color:#000;margin-right:auto}
.btn{border:1px solid var(--line);background:var(--card);color:var(--ink);font-family:inherit;font-size:13px;font-weight:600;padding:8px 12px;border-radius:9px;cursor:pointer}
.btn:active{transform:scale(.97)}
.btn.prime{background:#0d1117;color:#fff;border-color:#0d1117}
.panel{margin:0 12px 10px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 13px;display:none}
.panel.open{display:block}
.panel h4{font-size:13px;margin-bottom:8px}
.panel .row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:13px;color:var(--muted)}
.panel input[type=number]{width:64px;padding:7px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:14px;text-align:center}
.panel .danger{color:var(--ppp);border-color:var(--ppp-soft);background:var(--ppp-soft)}

.sec-h{font-size:13px;font-weight:800;color:var(--muted);letter-spacing:.03em;padding:2px 14px 5px;display:flex;align-items:center;gap:6px}
.sec-h .tag{font-size:10px;background:#0d1117;color:#fff;padding:2px 7px;border-radius:20px;font-weight:700}

.scroller{overflow-x:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-x:contain;position:relative}
.scroll-inner{width:-webkit-max-content;width:max-content;min-width:100%;padding:0 12px}
.scrollhint{font-size:12px;color:#000;padding:2px 14px 6px;display:flex;align-items:center;gap:5px}
.scrollhint b{color:var(--wait)}

.grp{background:var(--card);margin:0 0 8px;border:1px solid var(--line);border-radius:12px;overflow:hidden;width:-webkit-max-content;width:max-content;min-width:100%}
.grp-h{display:flex;align-items:center;gap:8px;padding:11px 13px;cursor:pointer;user-select:none}
.grp-h .cv{font-size:11px;color:var(--muted);transition:transform .2s}
.grp.collapsed .cv{transform:rotate(-90deg)}
.grp-h .name{font-weight:800;font-size:15px}
.grp-h .sub{margin-left:auto;font-size:13px;color:#000;font-variant-numeric:tabular-nums;text-align:right;line-height:1.5}
.grp-body{border-top:1px solid var(--line)}
.grp.collapsed .grp-body{display:none}
.grp-tools{display:flex;gap:6px;padding:8px 13px;border-top:1px dashed var(--line);background:#fafbfc}
.mini{border:1px solid var(--line);background:#fff;border-radius:7px;width:34px;height:34px;font-size:18px;font-weight:800;cursor:pointer;color:var(--muted)}
.grp-tools span{font-size:14px;font-weight:700;color:#374151;align-self:center}

.row-p{display:flex;align-items:center;gap:4px;padding:3px 6px;border-top:1px solid #f1f2f4}
.row-p:first-child{border-top:none}
.row-p .pn{font-size:12px;font-weight:600;width:38px;flex:none;color:#374151}
.row-p.filled{background:#f7fbf8}
.row-p.filled .pn::after{content:"●";color:var(--done);font-size:8px;margin-left:3px;vertical-align:middle}
.row-p.recheck{background:#f4f0fd;box-shadow:inset 3px 0 0 var(--wait)}
.inp{width:100%;border:1.5px solid var(--line);border-radius:8px;padding:7px 6px;font-family:inherit;font-size:16px;text-align:center;font-weight:700;font-variant-numeric:tabular-nums}
.inp.p{border-color:#f0cdd3} .inp.p:focus{outline:none;border-color:var(--ppp);background:var(--ppp-soft)}
.inp.d{border-color:#cdd9f0} .inp.d:focus{outline:none;border-color:var(--dem);background:var(--dem-soft)}
.inp.f{border-color:#f6d8bb} .inp.f:focus{outline:none;border-color:var(--ref);background:var(--ref-soft)}
.inp.x{border-color:#e3e5e8;color:#6b7280;font-weight:600;padding:3px 4px} .inp.x:focus{outline:none;border-color:#9ca3af;background:#f3f4f6}
.inp.w{border-color:#d9cdf2;color:#5b34c4;font-weight:600;background:#f7f3fe;padding:3px 4px} .inp.w:focus{outline:none;border-color:var(--wait);background:#f0e9fc}
.cell{width:76px;flex:none;min-width:0}
.cellx{width:42px;flex:none}
.cellw{width:42px;flex:none}
.rck{flex:none;border:1px solid #e7e9ec;background:#f3f4f6;width:46px;height:34px;border-radius:8px;font-size:12px;font-weight:800;color:#374151;cursor:pointer;line-height:1}
.rck.on{background:var(--wait);border-color:var(--wait);color:#fff}
.cpy{flex:none;border:none;background:#e3f2f7;color:#0a7ea4;width:40px;height:34px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cpy:active{background:#dde0e4}

.float{position:fixed;left:50%;transform:translateX(-50%);bottom:16px;z-index:60;width:calc(100% - 24px);max-width:536px;display:flex;gap:8px}
.float .fb{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:13px;padding:15px;font-family:inherit;font-size:15px;font-weight:800;color:#fff;background:#0d1117;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.22)}
.float .fb:active{transform:translateY(1px)}
.toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%) translateY(20px);background:#0d1117;color:#fff;padding:11px 18px;border-radius:24px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:100}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.hd{padding:14px 14px 2px}
.hd .t{font-size:18px;font-weight:900;letter-spacing:-.01em}
.hd .s{font-size:13px;color:#000;font-weight:700;margin-top:2px}
</style>
</head>
<body>
<div class="wrap">

  <div class="hd">
    <div class="t">과천시장 개표집계</div>
    <div class="s">제9회 지방선거 · 개표참관 실시간 입력</div>
  </div>

  <div class="summary">
    <div class="ttl"><span>📊 확정 누적 현황</span><b id="clock">--:--</b></div>
    <div class="bars">
      <div class="bar"><span class="dot" style="background:var(--dem)"></span><span class="nm">김종천</span>
        <span class="track"><span class="fill" id="fillB" style="background:var(--dem);width:0%"></span><span class="pct" id="pctB">0%</span></span>
        <span class="vot" id="votB">0</span></div>
      <div class="bar"><span class="dot" style="background:var(--ppp)"></span><span class="nm">신계용</span>
        <span class="track"><span class="fill" id="fillA" style="background:var(--ppp);width:0%"></span><span class="pct" id="pctA">0%</span></span>
        <span class="vot" id="votA">0</span></div>
      <div class="bar"><span class="dot" style="background:var(--ref)"></span><span class="nm">고금란</span>
        <span class="track"><span class="fill" id="fillC" style="background:var(--ref);width:0%"></span><span class="pct" id="pctC">0%</span></span>
        <span class="vot" id="votC">0</span></div>
    </div>
    <div class="gapline">
      <span class="gap" id="gap">격차 —</span>
      <span class="prog" id="prog">공표 0 / 0곳</span>
    </div>
    <div class="subline" id="subline">무효 0표 · 집계 0표</div>
    <div class="subline" id="rckline" style="display:none;color:#b39af0"></div>
  </div>

  <div class="toolbar">
    <span class="save" id="saveState">저장됨</span>
    <button class="btn" onclick="togglePanel()">⚙ 설정</button>
    <button class="btn prime" onclick="copySummary()">현황 복사</button>
  </div>

  <div class="panel" id="panel">
    <h4>동별 투표소 개수 일괄 설정</h4>
    <div class="row"><span>각 동에 투표소</span><input type="number" id="bulkN" min="1" max="20" value="3"><span>개씩</span>
      <button class="btn" onclick="bulkApply()">적용</button></div>
    <div class="row" style="margin-top:6px">※ 공식 투표구 명부에 맞춰 각 동 머리줄의 +/− 로 미세조정하세요.</div>
    <div class="row" style="margin-top:12px"><button class="btn danger" onclick="resetAll()">전체 입력값 초기화</button></div>
  </div>

  <div class="scroller">
    <div class="scroll-inner">
      <div id="secA"></div>
      <div id="secB"></div>
    </div>
  </div>

</div>

<div class="float"><button class="fb" onclick="copySummary()"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>캠프 전송용 현황 보내기</button></div>
<div class="toast" id="toast"></div>

<script>
const DONGS = ["갈현동","과천동","문원동","별양동","부림동","중앙동","원문동"];
const CANDS = [
  {k:"b", name:"김종천", short:"김", party:"민주당", dot:"🔵", cls:"d"},
  {k:"a", name:"신계용", short:"신", party:"국민의힘", dot:"🔴", cls:"p"},
  {k:"c", name:"고금란", short:"고", party:"개혁신당", dot:"🟠", cls:"f"}
];
const SPGROUPS = [
  {key:"gn", label:"관내사전투표", short:"관내사전", addable:true},
  {key:"gw", label:"관외사전투표", short:"관외사전", addable:true},
  {key:"gs", label:"거소·선상투표", short:"거소·선상", addable:false}
];
const KEY = "gwacheon_gaepyo_v1";

let state = load();

function mkRow(n){return {n,a:"",b:"",c:"",x:"",w:"",r:false};}
function blankEd(n){const o={}; DONGS.forEach(d=>{o[d]=Array.from({length:n},(_,i)=>mkRow("제"+(i+1)+"투"))}); return o;}
function blankSp(){return {gn:[mkRow("관내사전투표")], gw:[mkRow("관외사전투표")], gs:[mkRow("거소·선상투표")]};}
function spGroup(key){return SPGROUPS.find(g=>g.key===key);}
function renameSp(key){
  const arr=state.sp[key], g=spGroup(key);
  if(arr.length===1){ arr[0].n=g.label; } else arr.forEach((p,i)=>p.n=g.short+" "+(i+1));
}
function fixRow(p){["a","b","c","x","w"].forEach(f=>{if(p[f]===undefined)p[f]="";});if(p.r===undefined)p.r=false;}
function norm(s){
  DONGS.forEach(d=>{ if(!s.ed[d]) s.ed[d]=blankEd(1)[d]; s.ed[d].forEach(fixRow); });
  if(Array.isArray(s.sp)){ s.sp=blankSp(); }
  else ["gn","gw","gs"].forEach(k=>{ if(!s.sp[k]||!s.sp[k].length) s.sp[k]=blankSp()[k]; s.sp[k].forEach(fixRow); });
  return s;
}
function load(){
  try{const s=JSON.parse(localStorage.getItem(KEY)); if(s&&s.ed&&s.sp) return norm(s);}catch(e){}
  return {ed:blankEd(3), sp:blankSp()};
}
function save(){
  try{localStorage.setItem(KEY,JSON.stringify(state));
    document.getElementById('saveState').textContent="✓ 저장됨 "+nowHM();}
  catch(e){document.getElementById('saveState').textContent="⚠ 저장불가";}
}
const num = v => { const n=parseInt(String(v).replace(/[^0-9]/g,''),10); return isNaN(n)?0:n; };
const fmt = n => n.toLocaleString('ko-KR');
const SHAREICON='<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>';
function nowHM(){const d=new Date();return String(d.getHours()).padStart(2,'0')+":"+String(d.getMinutes()).padStart(2,'0');}
function nowStamp(){const d=new Date();const w=['일','월','화','수','목','금','토'];return (d.getMonth()+1)+"/"+d.getDate()+"("+w[d.getDay()]+") "+nowHM();}

function allRows(){
  const r=[];
  DONGS.forEach(d=>state.ed[d].forEach((p,i)=>r.push({...p,full:d+" "+p.n,ref:state.ed[d][i]})));
  SPGROUPS.forEach(g=>state.sp[g.key].forEach((p,i)=>r.push({...p,full:p.n,ref:state.sp[g.key][i]})));
  return r;
}
function entered(p){return p.a!==""||p.b!==""||p.c!==""||p.x!=="";}
function subText(arr,unit){
  let sa=0,sb=0,sc=0,sx=0,sw=0,filled=0;
  arr.forEach(p=>{sa+=num(p.a);sb+=num(p.b);sc+=num(p.c);sx+=num(p.x);sw+=num(p.w);if(entered(p))filled++;});
  return `김${fmt(sb)} 신${fmt(sa)} 고${fmt(sc)}<br>무${fmt(sx)} · 대기${fmt(sw)} · ${filled}/${arr.length}${unit}`;
}

function render(){
  let a=`<div class="sec-h"><span class="tag">A</span> 선거일 투표소 · 동별</div>`;
  DONGS.forEach(d=>{
    const arr=state.ed[d];
    a+=`<div class="grp ${arr._c?'collapsed':''}" data-d="${d}">
      <div class="grp-h" onclick="toggleGrp('${d}')">
        <span class="cv">▼</span><span class="name">${d}</span>
        <span class="sub">${subText(arr,'곳')}</span>
      </div>
      <div class="grp-body">`;
    arr.forEach((p,i)=>{ a+=rowHTML('ed',d,i,p); });
    a+=`<div class="grp-tools">
        <button class="mini" onclick="rmP('${d}')">−</button>
        <button class="mini" onclick="addP('${d}')">+</button>
        <span>투표소 ${arr.length}개</span>
      </div></div></div>`;
  });
  document.getElementById('secA').innerHTML=a;

  let b=`<div class="sec-h"><span class="tag">B</span> 사전 · 거소투표 · 동 구분 없음</div>`;
  SPGROUPS.forEach(g=>{
    const arr=state.sp[g.key];
    b+=`<div class="grp" data-sp="${g.key}">
      <div class="grp-h" style="cursor:default">
        <span class="name">${g.label}</span>
        <span class="sub">${subText(arr,'묶음')}</span>
      </div>
      <div class="grp-body">`;
    arr.forEach((p,i)=>{ b+=rowHTML('sp',g.key,i,p); });
    if(g.addable){
      b+=`<div class="grp-tools">
        <button class="mini" onclick="rmSp('${g.key}')">−</button>
        <button class="mini" onclick="addSp('${g.key}')">+</button>
        <span>${g.label} ${arr.length}묶음</span></div>`;
    }
    b+=`</div></div>`;
  });
  b+=`<div style="height:8px"></div>`;
  document.getElementById('secB').innerHTML=b;
  recompute();
}

function rowHTML(kind,d,i,p){
  const inRck=(p.r||num(p.w)>0);
  let cinp=CANDS.map(cd=>`<span class="cell"><input class="inp ${cd.cls}" inputmode="numeric" placeholder="${cd.name}" value="${p[cd.k]}"
      oninput="setV('${kind}','${d}',${i},'${cd.k}',this.value)"></span>`).join('');
  return `<div class="row-p ${entered(p)?'filled':''} ${inRck?'recheck':''}">
    <span class="pn">${p.n}</span>
    ${cinp}
    <span class="cellx"><input class="inp x" inputmode="numeric" placeholder="무효" value="${p.x}"
      oninput="setV('${kind}','${d}',${i},'x',this.value)"></span>
    <span class="cellw"><input class="inp w" inputmode="numeric" placeholder="대기" value="${p.w}"
      oninput="setV('${kind}','${d}',${i},'w',this.value)"></span>
    <button class="rck ${p.r?'on':''}" onclick="toggleRck('${kind}','${d}',${i})">재검</button>
    <button class="cpy" onclick="copyRow('${kind}','${d}',${i})">${SHAREICON}</button>
  </div>`;
}

function getRef(kind,d,i){ return kind==='ed'? state.ed[d][i] : state.sp[d][i]; }
function setV(kind,d,i,f,val){ getRef(kind,d,i)[f]=val.replace(/[^0-9]/g,''); updateSubtotals(); recompute(); save(); }
function toggleRck(kind,d,i){ const ref=getRef(kind,d,i); ref.r=!ref.r; render(); save(); }
function addP(d){ const a=state.ed[d]; a.push(mkRow("제"+(a.length+1)+"투")); render(); save(); }
function rmGuard(arr){ if(arr.some(function(p){return p.a!==""||p.b!==""||p.c!==""||p.x!==""||p.w!=="";})){ toast("입력값이 있어 삭제할 수 없어요. 먼저 숫자를 모두 지워주세요"); return true; } return false; }
function rmP(d){ const a=state.ed[d]; if(a.length<=1)return; if(rmGuard(a))return; a.pop(); render(); save(); }
function addSp(key){ state.sp[key].push(mkRow("")); renameSp(key); render(); save(); }
function rmSp(key){ const a=state.sp[key]; if(a.length<=1)return; if(rmGuard(a))return; a.pop(); renameSp(key); render(); save(); }
function toggleGrp(d){ const cur=state.ed[d]; cur._c=!cur._c; render(); }

function updateSubtotals(){
  DONGS.forEach(d=>{ const g=document.querySelector(`.grp[data-d="${d}"] .sub`); if(g) g.innerHTML=subText(state.ed[d],'곳'); });
  SPGROUPS.forEach(gr=>{ const g=document.querySelector(`.grp[data-sp="${gr.key}"] .sub`); if(g) g.innerHTML=subText(state.sp[gr.key],'묶음'); });
  render._light && render._light();
}
render._light = function(){
  const rows=allRows(); const els=document.querySelectorAll('.row-p');
  els.forEach((el,idx)=>{ const r=rows[idx]; if(!r)return;
    el.classList.toggle('filled',entered(r));
    el.classList.toggle('recheck',(r.r||num(r.w)>0));
  });
};

function tallyAll(){
  const s={a:0,b:0,c:0}; let X=0,W=0,done=0,total=0,rck=0;
  allRows().forEach(r=>{ total++; W+=num(r.w); if(r.r||num(r.w)>0)rck++;
    if(entered(r)){ done++; s.a+=num(r.a); s.b+=num(r.b); s.c+=num(r.c); X+=num(r.x); } });
  return {s,X,W,done,total,rck};
}
function leaderText(s){
  const arr=CANDS.map(cd=>({name:cd.name,v:s[cd.k]})).sort((x,y)=>y.v-x.v);
  if(arr[0].v===0) return '격차 —';
  return `1위 ${arr[0].name} (2위와 +${fmt(arr[0].v-arr[1].v)})`;
}
function recompute(){
  const {s,X,W,done,total,rck}=tallyAll();
  const T=s.a+s.b+s.c;
  CANDS.forEach(cd=>{ const v=s[cd.k], p=T?v/T*100:0, U=cd.k.toUpperCase();
    document.getElementById('vot'+U).textContent=fmt(v);
    document.getElementById('pct'+U).textContent=p.toFixed(1)+'%';
    document.getElementById('fill'+U).style.width=p+'%';
  });
  document.getElementById('gap').textContent=leaderText(s);
  document.getElementById('prog').textContent=`공표 ${done} / ${total}곳`;
  const ballots=T+X, ir=ballots?X/ballots*100:0;
  document.getElementById('subline').textContent=`무효 ${fmt(X)}표 (${ir.toFixed(1)}%) · 집계 ${fmt(ballots)}표`;
  const rl=document.getElementById('rckline');
  if(rck>0||W>0){rl.style.display='block';rl.textContent=`⚠ 재검 ${rck}곳 · 재검대기 ${fmt(W)}장 (수치 잠정)`;}
  else rl.style.display='none';
  document.getElementById('clock').textContent=nowHM();
}

function bulkApply(){
  const n=Math.max(1,Math.min(20,num(document.getElementById('bulkN').value)||3));
  DONGS.forEach(d=>{ const old=state.ed[d]; const arr=[];
    for(let i=0;i<n;i++){ const o=old[i]; const nr=mkRow("제"+(i+1)+"투"); if(o){nr.a=o.a;nr.b=o.b;nr.c=o.c;nr.x=o.x;nr.w=o.w;nr.r=o.r;} arr.push(nr); }
    arr._c=old._c; state.ed[d]=arr; });
  render(); save(); toast(`각 동 ${n}개 투표소로 설정됨`); togglePanel();
}
function resetAll(){
  if(!confirm("모든 입력값을 지웁니다. 투표소 구성은 유지됩니다.\n계속할까요?"))return;
  DONGS.forEach(d=>state.ed[d].forEach(p=>{p.a="";p.b="";p.c="";p.x="";p.w="";p.r=false;}));
  SPGROUPS.forEach(g=>state.sp[g.key].forEach(p=>{p.a="";p.b="";p.c="";p.x="";p.w="";p.r=false;}));
  render(); save(); toast("초기화 완료");
}
function togglePanel(){ document.getElementById('panel').classList.toggle('open'); }

function copyRow(kind,d,i){
  const p=getRef(kind,d,i); const x=num(p.x),w=num(p.w);
  const T=num(p.a)+num(p.b)+num(p.c);
  if(T===0&&x===0&&w===0){toast("입력값이 없습니다");return;}
  const name=kind==='ed'?(d+" "+p.n):p.n;
  const parts=CANDS.map(cd=>{const v=num(p[cd.k]); const pc=T?(v/T*100).toFixed(1):'0.0'; return `${cd.dot}${cd.name} ${fmt(v)}(${pc}%)`;});
  const sorted=CANDS.map(cd=>({name:cd.name,v:num(p[cd.k])})).sort((m,n)=>n.v-m.v);
  const lead=T?`1위 ${sorted[0].name}`:'';
  const wt=w>0?` · 재검대기 ${fmt(w)}`:'';
  const tag=(p.r||w>0)?' ⚠재검중(잠정)':'';
  doCopy(`[${name}] ${parts.join(' · ')} · 무효 ${fmt(x)}${wt} · ${lead}${tag}\n🕐 보낸시각 ${nowStamp()}`);
}
function copySummary(){
  const {s,X,W,done,total,rck}=tallyAll();
  const T=s.a+s.b+s.c;
  if(T===0&&X===0&&W===0){toast("아직 입력된 값이 없습니다");return;}
  const lines=CANDS.map(cd=>{const v=s[cd.k], p=T?(v/T*100).toFixed(1):'0.0'; return `${cd.dot} ${cd.name} ${fmt(v)}표 (${p}%)`;});
  const ballots=T+X, ir=ballots?(X/ballots*100).toFixed(1):'0.0';
  let ed={a:0,b:0,c:0}, sp={a:0,b:0,c:0};
  DONGS.forEach(d=>state.ed[d].forEach(p=>{ed.a+=num(p.a);ed.b+=num(p.b);ed.c+=num(p.c);}));
  SPGROUPS.forEach(g=>state.sp[g.key].forEach(p=>{sp.a+=num(p.a);sp.b+=num(p.b);sp.c+=num(p.c);}));
  const rckLine=(rck>0||W>0)?`\n⚠ 재검 ${rck}곳 · 재검대기 ${fmt(W)}장 (수치 잠정)`:'';
  const txt=
`📊 과천시장 개표현황 ${nowHM()}
공표 ${done}/${total}곳
━━━━━━━━━━
${lines.join('\n')}
👉 ${leaderText(s)}
무효 ${fmt(X)}표 (${ir}%) · 집계 ${fmt(ballots)}표${rckLine}
━━━━━━━━━━
· 선거일 김${fmt(ed.b)} 신${fmt(ed.a)} 고${fmt(ed.c)}
· 사전·거소 김${fmt(sp.b)} 신${fmt(sp.a)} 고${fmt(sp.c)}
🕐 보낸시각 ${nowStamp()}`;
  doCopy(txt);
}
function doCopy(t){
  if(navigator.share){ navigator.share({text:t}).catch(function(e){ if(e&&e.name==="AbortError")return; fallback(t); }); }
  else fallback(t);
}
function fallback(t){ const ta=document.createElement('textarea'); ta.value=t; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');toast("복사됨");}catch(e){toast("복사 실패");} document.body.removeChild(ta); }
let tt; function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),1800);}

render();
setInterval(()=>document.getElementById('clock').textContent=nowHM(),30000);
</script>
</body>
</html>
